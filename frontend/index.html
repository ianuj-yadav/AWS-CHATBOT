<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AWS CHATBOT</title>
  <link rel="stylesheet" href="style.css">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet">

  <!-- Markdown Parsers -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
  <div class="app-wrapper" id="appWrapper" data-theme="light">

    <!-- Floating Action Button -->
    <button class="fab-button" id="fabBtn" aria-label="Open Chat">
      <div class="fab-icon-wrapper">
        <i data-lucide="message-square"></i>
      </div>
    </button>

    <!-- Widget Container -->
    <div class="widget-container" id="widgetContainer" style="display: none;">

      <!-- Header -->
      <header class="header">
        <button class="header-btn" id="menuBtn" aria-label="Open menu">
          <i data-lucide="menu"></i>
        </button>

        <div class="header-info">
          <h1>ICAI CHATBOT</h1>
          <p>Online</p>
        </div>

        <button class="header-btn" id="adminBtn" aria-label="Admin panel">
          <i data-lucide="settings"></i>
        </button>

        <button class="header-btn" id="closeBtn" aria-label="Close Chat">
          <i data-lucide="x"></i>
        </button>
      </header>

      <!-- Overlay Sidebar -->
      <div class="sidebar-overlay" id="sidebarOverlay">
        <div class="sidebar-header" style="display:flex; gap:10px; align-items:center;">
          <button class="new-chat-btn" id="newChatBtn" style="flex:1;">
            <span class="icon-wrapper">
              <i data-lucide="message-square-plus" width="16" height="16"></i>
            </span>
            <span style="flex: 1; text-align: left;">New Chat</span>
          </button>
          <button class="header-btn" id="closeSidebarBtn" aria-label="Close menu" style="flex-shrink:0;">
            <i data-lucide="x"></i>
          </button>
        </div>

        <div class="chat-list">
          <div class="chat-list-label">Recent Chats</div>
          <div id="chatHistoryContainer"></div>
        </div>

        <div class="sidebar-footer">
          <button class="theme-toggle" id="themeBtn">
            <i data-lucide="moon" id="themeIconDark" width="18" height="18" style="display:none;"></i>
            <i data-lucide="sun" id="themeIconLight" width="18" height="18" style="display:none;"></i>
            <span id="themeLabel">Light Mode</span>
          </button>
        </div>
      </div>

      <!-- Main Chat Area -->
      <div class="chat-area" id="chatArea">
        <div class="messages-container" id="messagesContainer">
          <!-- Dynamic content injected here -->
        </div>
      </div>

      <!-- Input Area -->
      <div class="input-area">
        <div class="input-container">
          <textarea class="input-field" id="messageInput" placeholder="Message..." rows="1" autofocus></textarea>
          <button class="send-btn" id="sendBtn" aria-label="Send message" disabled>
            <i data-lucide="send" width="18" height="18"></i>
          </button>
        </div>
      </div>

    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>

</html>
